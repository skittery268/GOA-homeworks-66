<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0"> <!-- displays site properly based on user's device -->
    <link rel="icon" type="image/png" sizes="32x32" href="./images/favicon-32x32.png">
    <title>Frontend Mentor | Age calculator app</title>
    <link rel="stylesheet" href="./style.css">
</head>
<body>
	<div id="container">
		<div id="top">
			<form id="form">
				<div class="input">
					<label for="dd">DAY</label>
					<input type="number" name="day" id="dd" placeholder="DD">
				</div>
				<div class="input">
					<label for="mm">MONTH</label>
					<input type="number" name="month" id="mm" placeholder="MM">
				</div>
				<div class="input">
					<label for="yyyy">YEAR</label>
					<input type="number" name="year" id="yyyy" placeholder="YYYY">
				</div>
				<button type="submit">
					<img src="./images/icon-arrow.svg" height="20">
				</button>
			</form>
		</div>

		<div id="bottom">
			<h1><span id="years">-- </span> years</h1>
			<h1><span id="months">-- </span> months</h1>
			<h1><span id="days">-- </span> days</h1>
		</div>
	</div>
    
    <script src="script.js"></script>
</body>
</html>
